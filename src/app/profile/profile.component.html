
<p *ngIf="isLoggedIn">Welcome back, Aliya! </p>
<p *ngIf="!isLoggedIn"> Please log in. </p>
<button (click)="toggleLogin()">Toggle Login</button>
<br><br>
<h3>My Skills</h3>
<ul>
    <li *ngFor="let skill of skills ; let i=index">
     {{ i + 1 }}. {{skill}}
     </li>
</ul>

<div [ngSwitch]="userRole">
  <p *ngSwitchCase="'admin'">🔴 Admin Panel</p>
  <p *ngSwitchCase="'editor'">🟡 Editor Access</p>
  <p *ngSwitchCase="'viewer'">🟢 View Only</p>
  <p *ngSwitchDefault>⚪ Unknown Role</p>
</div>
